_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: Timezone Bot
  description: A bot to help teams coordinate across time zones
  background_color: "#2c3e50"
features:
  bot_user:
    display_name: Timezone Bot
    always_online: true
  slash_commands:
    - command: /timezone
      description: Show all team member timezones
      usage_hint: "[no parameters needed]"
      should_escape: false
    - command: /timezone-set
      description: Set your timezone
      usage_hint: "America/New_York"
      should_escape: false
    - command: /time
      description: Quick time check for all zones
      usage_hint: "[no parameters needed]"
      should_escape: false
    - command: /timezone-convert
      description: Convert time between timezones
      usage_hint: "14:30 EST PST"
      should_escape: false
    - command: /timezone-meeting
      description: Find best meeting times across team zones
      usage_hint: "[no parameters needed]"
      should_escape: false
    - command: /timezone-list
      description: List available timezones
      usage_hint: "[search term optional]"
      should_escape: false
    - command: /timezone-preferences
      description: Set your timezone display preferences
      usage_hint: "timeFormat 12h"
      should_escape: false
    - command: /timezone-reminder
      description: Set timezone change reminders
      usage_hint: "enable"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false